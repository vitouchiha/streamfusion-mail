# ── StreamFusion Mail — Docker Compose (Mini PC) ────────────────────────────
#
# Questo stack gira sul Mini PC e serve come PROXY VPN per Vercel.
#
# Architettura:
#
#   [Vercel serverless]
#        │  PROXY_URL=http://user:pass@TUO_IP_PUBBLICO:8118
#        ▼
#   [gost-proxy :8118]  ← network_mode: service:gluetun
#        │  tutto il traffico esce dall'IP italiano WireGuard
#        ▼
#   [Gluetun WireGuard VPN]
#        │
#        ▼
#   kisskh.co / ramaorientalfansub.live  ✅ (non vedono IP Vercel/AWS)
#
# Uso:
#   1. Copia stack.env.example → stack.env con credenziali WireGuard + proxy auth
#   2. docker compose --env-file stack.env up -d
#   3. Apri porta 8118 sul router (NAT → IP Mini PC)
#   4. In Vercel: imposta PROXY_URL=http://PROXY_USER:PROXY_PASS@TUO_IP_PUBBLICO:8118
#   5. vercel env pull && vercel --yes --prod

version: "3.9"

volumes:
  gluetun-config:

services:

  # ── Gluetun WireGuard VPN ────────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: streamfusion-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_DNS=${WIREGUARD_DNS}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ALLOWED_IPS=0.0.0.0/0,::/0
      - WIREGUARD_PERSISTENT_KEEPALIVE=25
      # Porta proxy esposta su internet (inbound)
      - FIREWALL_INPUT_PORTS=8118
    ports:
      # Porta proxy HTTP — forwardarla sul router verso questo Mini PC
      - "8118:8118/tcp"
    volumes:
      - gluetun-config:/gluetun
    restart: unless-stopped
    healthcheck:
      test: wget -qO- https://ipinfo.io/ip || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Gost HTTP Proxy (usa la rete VPN di Gluetun) ─────────────────────────
  # Tutto il traffico in uscita da questo proxy esce con l'IP italiano WireGuard.
  # Vercel invia le richieste qui → forward verso kisskh.co con IP italiano.
  gost-proxy:
    image: ginuerzh/gost:2.12
    container_name: streamfusion-proxy
    # IMPORTANTE: condivide la rete con gluetun → traffico esce dalla VPN
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    # HTTP proxy con autenticazione (cambia user/pass in stack.env)
    command: >
      -L "http://${PROXY_USER}:${PROXY_PASS}@:8118"
    restart: unless-stopped

