name = "kisskh-proxy"
main = "cfworker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Run the worker near the origin servers (EU) to avoid geo-blocks.
[placement]
mode = "smart"

[vars]
# AUTH_TOKEN is set as a secret via "wrangler secret put AUTH_TOKEN"
# Do not put it here in plaintext
